name: cvcraft-ai

services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data

  api:
    image: ghcr.io/${IMAGE_OWNER}/cvcraft-ai-api:latest
    restart: unless-stopped
    env_file:
      - server/.env.prod.docker
    ports:
      - "3001:3001"
    depends_on:
      - redis
      - postgres

  worker:
    image: ghcr.io/${IMAGE_OWNER}/cvcraft-ai-api:latest
    restart: unless-stopped
    command: ["pnpm", "--filter", "server", "start:workers"]
    env_file:
      - server/.env.prod.docker
    depends_on:
      - redis
      - postgres

  frontend:
    image: ghcr.io/${IMAGE_OWNER}/cvcraft-ai-frontend:latest
    restart: unless-stopped
    env_file:
      - frontend/.env.docker
    ports:
      - "5173:80"
    depends_on:
      - api

volumes:
  pg_data:
