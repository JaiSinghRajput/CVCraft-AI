name: cvcraft-ai

services:
  redis:
    image: redis:7-alpine
    container_name: cvcraft-redis
    profiles: ["infra"]
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres:
    image: postgres:16-alpine
    container_name: cvcraft-postgres
    profiles: ["infra"]
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5433:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: server/Dockerfile
    container_name: cvcraft-api
    env_file:
      - server/.env.docker
    ports:
      - "3001:3001"

  worker:
    build:
      context: .
      dockerfile: server/Dockerfile
    container_name: cvcraft-worker
    command: ["pnpm", "--filter", "server", "start:workers"]
    env_file:
      - server/.env.docker

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: cvcraft-frontend
    env_file:
      - frontend/.env.docker
    ports:
      - "5173:80"
    depends_on:
      - api

volumes:
  pg_data:
